<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="log写的消消乐">
  <link rel="manifest" href="manifest.json">
  <title>log写的消消乐</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <span id="remaining">剩余 81</span>
      <div id="title-block">
        <span id="game-name">log写的消消乐</span>
        <span id="layout-name"></span>
      </div>
      <button id="new-game" class="btn-small">重新开始</button>
    </div>
    <div id="board-container">
      <div id="board"></div>
    </div>
    <div id="bar-container">
      <div id="bar"></div>
    </div>
  </div>
  <div id="overlay" class="hidden">
    <div id="overlay-content">
      <div id="overlay-icon"></div>
      <div id="overlay-title"></div>
      <div id="overlay-sub"></div>
      <button id="overlay-btn">再来一局</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
